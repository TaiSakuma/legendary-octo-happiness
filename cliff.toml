[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} \
      ([{{ commit.id | truncate(length=7, end="") }}]({{ remote_url() }}/commit/{{ commit.id }}))\
      {%- if commit.breaking %} **BREAKING**{% endif -%}
  {% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
tag_pattern = "v[0-9].*"
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/${GITHUB_REPO}/pull/${2}))" },
]
commit_parsers = [
  { message = "^docs: update CHANGELOG", skip = true },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^(refactor|style)", group = "<!-- 4 -->Refactoring" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^(build|ci|chore)", group = "<!-- 6 -->Build & CI" },
  { message = "^revert", group = "<!-- 7 -->Reverted" },
]
